repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: ["--fix", "--show-fixes"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: [types-docutils]
  - repo: https://github.com/tkoyama010/standard-readme-pre-commit
    rev: v0.1.0
    hooks:
      - id: standard-readme
