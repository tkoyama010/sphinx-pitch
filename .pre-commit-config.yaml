repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: ["--fix", "--show-fixes"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies: [types-docutils]
  - repo: https://github.com/tkoyama010/standard-readme-pre-commit
    rev: 810adb53324d6891fc270081b58e21db67fdafcb
    hooks:
      - id: standard-readme
