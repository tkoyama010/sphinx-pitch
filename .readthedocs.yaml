# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    build:
      html:
        # Use revealjs builder instead of standard html builder
        - mkdir -p $READTHEDOCS_OUTPUT/html/
        - sphinx-build -b revealjs docs $READTHEDOCS_OUTPUT/html/

python:
   install:
   - method: pip
     path: .
   - requirements: docs/requirements.txt
